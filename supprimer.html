<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- =====================SUPPRIMER UN PRODUIT====================== -->
 
    <div id="delete-modal" class="modal-overlay">
        <div class="modal-card">
            <div class="modal-icon">🗑️</div>
            <h3 class="modal-title">Confirmer la suppression ?</h3>
            <p class="modal-text">Attention, cette action est irréversible. Êtes-vous sûr de vouloir supprimer ce produit du système informatique ?</p>
            
            <div class="product-preview">
                <strong>Produit sélectionné :</strong><br>
                • ID : #1 <br>
                • Nom : Clavier Gamer <br>
                • En Stock : 20 unités
            </div>

            <form action="#page-dashboard" method="GET" style="display: flex; gap: 15px; justify-content: center;">
                <button type="submit" class="btn btn-danger" style="background-color: #dc3545; color: white; padding: 10px 25px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold;">
                    ⚠️ Oui, Supprimer
                </button>
                <a href="#page-dashboard" class="btn btn-secondary" style="text-decoration: none; padding: 10px 25px; border-radius: 4px; background-color: #6c757d; color: white; font-weight: bold;">
                    Annuler
                </a>
            </form>
        </div>
    </div>

</body>
