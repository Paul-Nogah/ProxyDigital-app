<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
      <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
<div id="page-login" class="app-container login-screen">
        <div class="login-card">
            <div class="logo-area">
                <div class="logo-icon">
                    <i class="fa-solid fa-cubes"></i>
                </div>
                <h1 style="color: blueviolet; font-family: Verdana, Geneva, Tahoma, sans-serif;">ProxyDigital</h1>
                <p class="subtitle" style="color: goldenrod;">La Digitalisation de Proximité</p>
            </div>
            
            <form class="login-form" onsubmit="event.preventDefault(); window.location.href='dashboard.html';">
                <div class="input-group">
                    <!-- <span class="input-icon">👤</span> -->
                    <span class="input-icon"><i class="fa-solid fa-user"></i></span>
                    <input type="text" placeholder="Nom d'utilisateur" required>
                </div>
                <div class="input-group">
                    <!-- <span class="input-icon">🔒</span> -->
                     <span class="input-icon"><i class="fa-solid fa-lock"></i></span>

                    <input type="password" placeholder="Mot de passe" required>
                </div>
                <button type="submit" class="btn btn-primary btn-block">Se connecter</button>
            </form>
            
            <p class="copyright">© 2026 ProxyDigital - La Digitalisation de Proximité</p>
        </div>
    </div>
</body>
</html>
