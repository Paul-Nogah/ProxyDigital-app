<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
     <!-- ===============PAGE D'AJOUT================= -->

    <div id="page-add-product" class="app-container main-layout">
          <aside class="sidebar">
            <div class="sidebar-brand">ProxyDigital</div>
            <nav class="sidebar-menu">
                <a href="dashboard.html" class="menu-item active"><span class="input-icon"><i class="fa-solid fa-chart-pie"></i></span>  Tableau de Bord</a>
                <a href="vente.html" class="menu-item"><span class="input-icon"><i class="fa-solid fa-cart-shopping"></i></span>  Effectuer une Vente</a>
                <a href="vente.html" class="menu-item"></i><span class="input-icon"><i class="fa-solid fa-plus"></i></span>  Ajouter un Produit</a>
                <a href="modifier.html" class="menu-item">🔄 Modifier</a>
                <a href="#" class="menu-item"><span class="input-icon"><i class="fa-solid fa-user"></i></span>  Utilisateurs</a>
            </nav>
            <a href="login.html" class="logout-btn"><span class="input-icon"><i class="fa-solid fa-user"></i></span>  Déconnexion</a>
        </aside>

        <main class="main-content">
            <div class="form-container-box" style="display: flex; width: 100%; max-width: 900px; gap: 60px; align-items: center;">
                
                <div class="form-left" style="flex: 1.2;">
                    <h2>AJOUTER UN NOUVEAU PRODUIT</h2>
                    <form class="crud-form">
                        <div class="form-group">
                            <label>Désignation du Produit</label>
                            <input type="text" placeholder="Ex: Clavier Gamer">
                        </div>
                        <div class="form-group">
                            <label>Prix d'Achat ($)</label>
                            <input type="number" step="0.01" placeholder="0.00">
                        </div>
                        <div class="form-group">
                            <label>Prix de Vente ($)</label>
                            <input type="number" step="0.01" placeholder="0.00">
                        </div>
                        <div class="form-group">
                            <label>Quantité en Stock</label>
                            <input type="number" placeholder="0">
                        </div>
                        <div class="form-group">
                            <label>Seuil d'Alerte</label>
                            <input type="number" placeholder="0">
                        </div>
                        <div class="form-actions" style="display: flex; gap: 15px; margin-top: 30px;">
                            <button type="submit" class="btn btn-success" style="background-color: #00a854; color: white;">💾 Enregistrer</button>
                            <a href="#page-dashboard" class="btn btn-secondary" style="text-decoration: none; text-align: center;">Annuler</a>
                        </div>
                    </form>
                </div>

                <div class="form-right-image" style="flex: 0.8; display: flex; justify-content: center;">
                    <svg viewBox="0 0 200 200" width="180" height="180">
                        <path d="M100 20 L160 50 L100 80 L40 50 Z" fill="#90caf9"/>
                        <path d="M40 50 L100 80 L100 150 L40 115 Z" fill="#42a5f5"/>
                        <path d="M100 80 L160 50 L160 115 L100 150 Z" fill="#1e88e5"/>
                        <circle cx="150" cy="140" r="26" fill="#007bff" />
                        <line x1="142" y1="140" x2="158" y2="140" stroke="white" stroke-width="4" stroke-linecap="round"/>
                        <line x1="150" y1="132" x2="150" y2="148" stroke="white" stroke-width="4" stroke-linecap="round"/>
                    </svg>
                </div>

            </div>
        </main>
    </div>
</body>
</html>
